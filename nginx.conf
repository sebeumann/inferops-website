worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Use /tmp for temp paths so non-root users can write
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Hashed build assets — long-lived immutable cache
    location /_astro/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable, max-age=31536000";
      try_files $uri =404;
    }

    # Other static assets — cache for a day
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
      access_log off;
      expires 1d;
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    # HTML — no cache, always revalidate
    location ~* \.html$ {
      add_header Cache-Control "no-cache, must-revalidate";
    }

    # Astro static output — fall back to 404.html for unknown routes
    location / {
      try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
  }
}
