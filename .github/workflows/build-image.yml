name: Build & Push Container Image

on:
  push:
    branches: [main]

concurrency:
  group: build-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sebeumann/inferops-website

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          short=${GITHUB_SHA::7}
          ts=$(date -u +%Y%m%d%H%M%S)
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "stamped=${ts}-${short}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.stamped }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
